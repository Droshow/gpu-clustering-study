! Arista cEOS - Leaf1 Startup Config
! Role: AI Leaf (simulates the server/GPU-facing switch)
!
hostname leaf1
!
! Enable eAPI
management api http-commands
   no shutdown
!
interface Management0
   ip address dhcp
!
! Uplink toward spine1
interface Ethernet1
   description "Uplink to spine1"
   no switchport
   ip address 10.0.0.1/31
!
! Loopback - represents a "GPU server" VTEP in the real world
interface Loopback0
   ip address 192.168.1.1/32
!
! BGP - leaf side
router bgp 65002
   router-id 192.168.1.1
   neighbor 10.0.0.0 remote-as 65001
   neighbor 10.0.0.0 description "spine1 - AI Spine"
   !
   address-family ipv4
      neighbor 10.0.0.0 activate
      network 192.168.1.1/32
!
end
