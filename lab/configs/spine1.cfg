! Arista cEOS - Spine1 Startup Config
! Role: AI Spine (simulates the GPU-cluster-facing switch)
!
hostname spine1
!
! Enable eAPI - this is how Terraform and Python talk to EOS
management api http-commands
   no shutdown
!
! Management interface (containerlab assigns IPs automatically)
interface Management0
   ip address dhcp
!
! The uplink toward leaf1 (eth1 = the "GPU uplink" in our story)
interface Ethernet1
   description "Link to leaf1"
   no switchport
   ip address 10.0.0.0/31
!
! BGP - spine side
router bgp 65001
   router-id 10.0.0.0
   neighbor 10.0.0.1 remote-as 65002
   neighbor 10.0.0.1 description "leaf1 - AI workload node"
   !
   address-family ipv4
      neighbor 10.0.0.1 activate
!
! QoS: ECN marking threshold (the "lossless fabric" secret sauce)
! This is what makes it AI-ready vs a standard switch
qos map dscp 46 to traffic-class 7
!
end
